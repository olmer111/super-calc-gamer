<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super-Calc Gamer 👑</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #00f2ff;
            --accent-2: #ff00ea;
            --text: #f8fafc;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            border: 2px solid var(--accent);
            width: 320px;
            text-align: center;
            transition: all 0.3s ease;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        #display {
            width: 100%;
            height: 60px;
            background: #000;
            border: 2px solid var(--accent-2);
            border-radius: 10px;
            color: var(--accent);
            font-size: 1.5rem;
            text-align: right;
            padding: 10px;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #334155;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #475569; transform: scale(1.05); }
        .op { background: var(--accent-2); color: white; }
        .eq { background: var(--accent); color: #000; grid-column: span 2; font-weight: bold; }
        #game-area {
            display: none;
            flex-direction: column;
            gap: 15px;
        }
        .game-box {
            background: #000;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--accent);
        }
        #game-question { font-size: 2rem; margin-bottom: 10px; }
        #game-input {
            width: 80%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            text-align: center;
            font-size: 1.2rem;
        }
        .nav-btn {
            margin-top: 20px;
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .nav-btn:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>
<div class="container" id="main-container">
    <div id="calc-view">
        <h1>SUPER CALC 👑</h1>
        <input type="text" id="display" readonly>
        <div class="grid">
            <button onclick="clearDisplay()">C</button>
            <button onclick="append('/')" class="op">÷</button>
            <button onclick="append('*')" class="op">×</button>
            <button onclick="backspace()">⌫</button>
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('-')" class="op">-</button>
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('+')" class="op">+</button>
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="calculate()" class="eq">=</button>
            <button onclick="append('0')" style="grid-column: span 2;">0</button>
            <button onclick="append('.')">.</button>
        </div>
        <button class="nav-btn" onclick="toggleView()">🎮 MODO JUEGO</button>
    </div>
    <div id="game-view" style="display:none;">
        <h1>Súper Reflex ⚡</h1>
        <div class="game-box">
            <div id="game-question">? + ?</div>
            <input type="number" id="game-input" placeholder="Resultado...">
            <p>Puntos: <span id="score">0</span></p>
        </div>
        <p style="font-size: 0.8rem;">Responde rápido o pierdes!</p>
        <button class="nav-btn" onclick="toggleView()">🧮 VOLVER A CALC</button>
    </div>
</div>
<script>
    let display = document.getElementById('display');
    function append(val) { display.value += val; }
    function clearDisplay() { display.value = ''; }
    function backspace() { display.value = display.value.slice(0, -1); }
    function calculate() {
        try { display.value = eval(display.value); } 
        catch { display.value = "Error ❌"; }
    }
    function toggleView() {
        const calc = document.getElementById('calc-view');
        const game = document.getElementById('game-view');
        if(calc.style.display === 'none') {
            calc.style.display = 'block';
            game.style.display = 'none';
            stopGame();
        } else {
            calc.style.display = 'none';
            game.style.display = 'block';
            startGame();
        }
    }
    let score = 0;
    let currentAns = 0;
    function startGame() {
        score = 0;
        document.getElementById('score').innerText = score;
        nextQuestion();
        document.getElementById('game-input').focus();
        document.getElementById('game-input').oninput = function() {
            if(parseInt(this.value) === currentAns) {
                score++;
                document.getElementById('score').innerText = score;
                this.value = '';
                nextQuestion();
            }
        };
    }
    function nextQuestion() {
        const a = Math.floor(Math.random() * 12) + 1;
        const b = Math.floor(Math.random() * 12) + 1;
        currentAns = a + b;
        document.getElementById('game-question').innerText = `${a} + ${b}`;
    }
    function stopGame() {
        document.getElementById('game-input').value = '';
    }
</script>
</body>
</html>
