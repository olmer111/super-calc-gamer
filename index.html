<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super-Calc Pro Max 👑 | Elite Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg: #020617;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #F59E0B;
            --accent: #8B5CF6;
            --text: #F8FAFC;
            --text-dim: #94A3B8;
            --neon-glow: 0 0 20px rgba(245, 158, 11, 0.4);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            z-index: -1;
        }

        .app-container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            width: 420px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            transition: transform 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            color: var(--primary);
            margin: 0;
            text-shadow: var(--neon-glow);
        }

        #display-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            text-align: right;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        #history {
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            color: var(--text-dim);
            min-height: 1.2rem;
            margin-bottom: 0.5rem;
            overflow: hidden;
            white-space: nowrap;
        }

        #main-display {
            font-family: 'Fira Code', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mode-nav {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .mode-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 4px;
            border-radius: 10px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .mode-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: var(--neon-glow);
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button.key {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 18px 0;
            border-radius: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button.key:hover { background: rgba(255,255,255,0.15); }
        button.key.op { color: var(--accent); border-color: var(--accent); }
        button.key.action { background: var(--primary); color: #000; font-weight: 700; }
        button.key.wide { grid-column: span 2; }

        /* Modal-like views for Converters/Finance */
        .special-view {
            display: none;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .input-group label { font-size: 0.8rem; color: var(--text-dim); }
        .input-group input, .input-group select {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Fira Code', monospace;
        }

        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--primary);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="header">
        <h1>SUPER-CALC PRO MAX 👑</h1>
        <div id="mode-indicator" style="font-size: 0.7rem; color: var(--primary)">BASIC</div>
    </div>

    <div id="display-container">
        <div id="history"></div>
        <div id="main-display">0</div>
    </div>

    <div class="mode-nav">
        <button class="mode-btn active" onclick="switchMode('basic')">BASIC</button>
        <button class="mode-btn" onclick="switchMode('sci')">SCI</button>
        <button class="mode-btn" onclick="switchMode('prog')">PROG</button>
        <button class="mode-btn" onclick="switchMode('conv')">CONV</button>
        <button class="mode-btn" onclick="switchMode('fin')">FIN</button>
    </div>

    <!-- BASIC / SCI / PROG VIEW -->
    <div id="main-grid" class="calc-grid">
        <!-- Dynamic keys injected here -->
    </div>

    <!-- CONVERTER VIEW -->
    <div id="conv-view" class="special-view">
        <div class="input-group">
            <label>Valor</label>
            <input type="number" id="conv-input" placeholder="0.00">
        </div>
        <div class="input-group">
            <label>De</label>
            <select id="conv-from">
                <option value="m">Metros</option>
                <option value="km">Kilómetros</option>
                <option value="kg">Kilos</option>
                <option value="lb">Libras</option>
                <option value="c">Celsius</option>
                <option value="f">Fahrenheit</option>
            </select>
        </div>
        <div class="input-group">
            <label>A</label>
            <select id="conv-to">
                <option value="km">Kilómetros</option>
                <option value="m">Metros</option>
                <option value="lb">Libras</option>
                <option value="kg">Kilos</option>
                <option value="f">Fahrenheit</option>
                <option value="c">Celsius</option>
            </select>
        </div>
        <button class="key action" onclick="doConversion()">CONVERTIR</button>
    </div>

    <!-- FINANCIAL VIEW -->
    <div id="fin-view" class="special-view">
        <div class="input-group">
            <label>Monto Principal</label>
            <input type="number" id="fin-principal" placeholder="0.00">
        </div>
        <div class="input-group">
            <label>Tasa Interés (%)</label>
            <input type="number" id="fin-rate" placeholder="0.00">
        </div>
        <div class="input-group">
            <label>Tiempo (Años)</label>
            <input type="number" id="fin-time" placeholder="0">
        </div>
        <button class="key action" onclick="calcFinance()">CALCULAR INTERÉS</button>
    </div>
</div>

<script>
    const state = {
        mode: 'basic',
        expression: '',
        history: '',
        lastResult: null
    };

    const keys = {
        basic: [
            {l: 'C', a: 'clear', c: 'action'}, {l: '(', a: '(', c: 'op'}, {l: ')', a: ')', c: 'op'}, {l: '÷', a: '/', c: 'op'},
            {l: '7', a: '7', c: ''}, {l: '8', a: '8', c: ''}, {l: '9', a: '9', c: ''}, {l: '×', a: '*', c: 'op'},
            {l: '4', a: '4', c: ''}, {l: '5', a: '5', c: ''}, {l: '6', a: '6', c: ''}, {l: '-', a: '-', c: 'op'},
            {l: '1', a: '1', c: ''}, {l: '2', a: '2', c: ''}, {l: '3', a: '3', c: ''}, {l: '+', a: '+', c: 'op'},
            {l: '0', a: '0', c: 'wide'}, {l: '.', a: '.', c: ''}, {l: '=', a: 'calc', c: 'action'}
        ],
        sci: [
            {l: 'sin', a: 'sin(', c: 'op'}, {l: 'cos', a: 'cos(', c: 'op'}, {l: 'tan', a: 'tan(', c: 'op'}, {l: 'C', a: 'clear', c: 'action'},
            {l: 'log', a: 'log10(', c: 'op'}, {l: 'exp', a: 'exp(', c: 'op'}, {l: 'sqrt', a: 'sqrt(', c: 'op'}, {l: '÷', a: '/', c: 'op'},
            {l: '7', a: '7', c: ''}, {l: '8', a: '8', c: ''}, {l: '9', a: '9', c: ''}, {l: '×', a: '*', c: 'op'},
            {l: '4', a: '4', c: ''}, {l: '5', a: '5', c: ''}, {l: '6', a: '6', c: ''}, {l: '-', a: '-', c: 'op'},
            {l: '1', a: '1', c: ''}, {l: '2', a: '2', c: ''}, {l: '3', a: '3', c: ''}, {l: '+', a: '+', c: 'op'},
            {l: '0', a: '0', c: 'wide'}, {l: 'π', a: 'PI', c: ''}, {l: '=', a: 'calc', c: 'action'}
        ],
        prog: [
            {l: 'DEC', a: 'dec', c: 'op'}, {l: 'HEX', a: 'hex', c: 'op'}, {l: 'BIN', a: 'bin', c: 'op'}, {l: 'C', a: 'clear', c: 'action'},
            {l: 'A', a: 'A', c: ''}, {l: 'B', a: 'B', c: ''}, {l: 'C', a: 'C', c: ''}, {l: 'D', a: 'D', c: ''},
            {l: 'E', a: 'E', c: ''}, {l: 'F', a: 'F', c: ''}, {l: '1', a: '1', c: ''}, {l: '2', a: '2', c: ''},
            {l: '3', a: '3', c: ''}, {l: '4', a: '4', c: ''}, {l: '5', a: '5', c: ''}, {l: '6', a: '6', c: ''},
            {l: '7', a: '7', c: ''}, {l: '8', a: '8', c: ''}, {l: '9', a: '9', c: ''}, {l: '0', a: '0', c: 'wide'},
            {l: '=', a: 'calc', c: 'action'}
        ]
    };

    function init() {
        switchMode('basic');
        window.addEventListener('mousedown', spawnParticles);
    }

    function switchMode(mode) {
        state.mode = mode;
        state.expression = '';
        state.history = '';
        
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.toLowerCase().includes(mode));
        });
        document.getElementById('mode-indicator').innerText = mode.toUpperCase();

        const mainGrid = document.getElementById('main-grid');
        const convView = document.getElementById('conv-view');
        const finView = document.getElementById('fin-view');

        // Cinematic GSAP Transition
        gsap.to("#app", { duration: 0.3, y: -10, opacity: 0.8, onComplete: () => {
            mainGrid.style.display = 'none';
            convView.style.display = 'none';
            finView.style.display = 'none';

            if (mode === 'basic' || mode === 'sci' || mode === 'prog') {
                mainGrid.style.display = 'grid';
                renderKeys(mode);
            } else if (mode === 'conv') {
                convView.style.display = 'flex';
            } else if (mode === 'fin') {
                finView.style.display = 'flex';
            }

            gsap.to("#app", { duration: 0.3, y: 0, opacity: 1 });
            updateDisplay();
        }});
    }

    function renderKeys(mode) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        keys[mode].forEach(k => {
            const btn = document.createElement('button');
            btn.className = `key ${k.c}`;
            btn.innerText = k.l;
            btn.onclick = (e) => handleKey(k.a, e);
            grid.appendChild(btn);
        });
    }

    function handleKey(action, event) {
        if (action === 'clear') {
            state.expression = '';
            state.history = '';
        } else if (action === 'calc') {
            try {
                const result = math.evaluate(state.expression);
                state.history = state.expression + ' =';
                state.expression = result.toString();
                
                anime({
                    targets: '#main-display',
                    scale: [1, 1.1, 1],
                    duration: 300,
                    easing: 'easeOutElastic(1, .6)'
                });
            } catch (e) {
                state.expression = 'Error';
            }
        } else if (state.mode === 'prog' && ['dec','hex','bin'].includes(action)) {
            // Fast base conversion
            if (!state.expression) return;
            try {
                const val = parseInt(state.expression, 10);
                if (action === 'hex') state.expression = val.toString(16).toUpperCase();
                if (action === 'bin') state.expression = val.toString(2);
                if (action === 'dec') state.expression = parseInt(state.expression, 16).toString(10); // Simplified
            } catch(e) { state.expression = 'Error'; }
        } else {
            state.expression += action;
        }
        updateDisplay();
        if (event) spawnParticles(event);
    }

    function updateDisplay() {
        document.getElementById('history').innerText = state.history;
        document.getElementById('main-display').innerText = state.expression || '0';
    }

    function doConversion() {
        const val = parseFloat(document.getElementById('conv-input').value);
        const from = document.getElementById('conv-from').value;
        const to = document.getElementById('conv-to').value;
        if (isNaN(val)) return;

        let result;
        // Simplified Conv Logic
        const map = { m: 1, km: 1000, kg: 1, lb: 0.453592 };
        if (from === 'c' && to === 'f') result = (val * 9/5) + 32;
        else if (from === 'f' && to === 'c') result = (val - 32) * 5/9;
        else if (map[from] && map[to]) result = val * (map[from] / map[to]);
        else result = "N/A";

        state.expression = result.toString();
        state.history = `${val}${from} ➔ ${to}`;
        updateDisplay();
        showCalc(); // Return to basics after conversion
    }

    function calcFinance() {
        const p = parseFloat(document.getElementById('fin-principal').value);
        const r = parseFloat(document.getElementById('fin-rate').value) / 100;
        const t = parseFloat(document.getElementById('fin-time').value);
        if (isNaN(p) || isNaN(r) || isNaN(t)) return;

        const result = p * (1 + r * t);
        state.expression = result.toFixed(2);
        state.history = `Interest: ${p} @ ${r*100}% for ${t}y`;
        updateDisplay();
        showCalc();
    }

    function showCalc() {
        switchMode('basic');
    }

    function spawnParticles(e) {
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        
        for (let i = 0; i < 6; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            document.body.appendChild(p);

            anime({
                targets: p,
                translateX: () => (Math.random() - 0.5) * 100,
                translateY: () => (Math.random() - 0.5) * 100,
                opacity: [1, 0],
                scale: [1, 0],
                duration: 1000 + Math.random() * 1000,
                easing: 'easeOutExpo',
                complete: () => p.remove()
            });
        }
    }

    window.onload = init;
</script>
</body>
</html>
